apiVersion: apps/v1
kind: Deployment
metadata:
  name: prefer-spread
spec:
  replicas: 2
  selector:
    matchLabels:
      app: prefer-spread
  template:
    metadata:
      labels:
        app: prefer-spread
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - prefer-spread
              topologyKey: kubernetes.io/hostname
      containers:
      - name: nginx
        image: nginx:1.27
        ports:
        - containerPort: 80
