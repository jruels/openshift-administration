apiVersion: apps/v1
kind: Deployment
metadata:
  name: no-toleration
spec:
  replicas: 2
  selector:
    matchLabels:
      app: no-toleration
  template:
    metadata:
      labels:
        app: no-toleration
    spec:
      containers:
      - name: nginx
        image: nginx:1.27
        ports:
        - containerPort: 80
